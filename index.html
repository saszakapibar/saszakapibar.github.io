<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Card - Storm Mode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            overflow: hidden;
            animation: storm-shake 0.3s infinite;
        }

        @keyframes storm-shake {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-1px, -2px); }
            50% { transform: translate(-1px, 2px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        /* Ikony - klikalne */
        .clickable { cursor: pointer; transition: transform 0.2s; }
        .clickable:hover { transform: scale(1.1); }

        .fixed-logo { position: fixed; top: 20px; left: 20px; width: 60px; height: 60px; z-index: 10; border-radius: 50%; border: 2px solid #30363d; }
        
        .capy-container { position: fixed; top: 20px; right: 20px; text-align: center; z-index: 10; }
        .capy-img { width: 80px; }
        .capy-text { margin-top: 5px; font-weight: bold; color: #fff; font-size: 12px; }

        .bottom-gif { position: fixed; bottom: 20px; left: 20px; width: 80px; z-index: 10; }
        .support-img { position: fixed; bottom: 20px; right: 20px; width: 50px; z-index: 10; border-radius: 50%; }

        /* Karta główna */
        .hub-card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            padding: 30px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; color: #f0f6fc; }
        .progress-container { background-color: #21262d; border-radius: 10px; height: 22px; width: 100%; margin-bottom: 35px; position: relative; }
        .progress-bar { height: 100%; width: 45%; background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); border-radius: 10px; }
        .bmc-button { display: inline-flex; justify-content: center; width: 100%; padding: 14px; background-color: #FFDD00; color: #000; text-decoration: none; font-weight: 700; border-radius: 10px; transition: transform 0.1s; }
        .bmc-button:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <img src="https://pbs.twimg.com/media/FGH_shaXwAQOUid.png" class="fixed-logo clickable" alt="Logo" onclick="alert('To jest Twoje logo!')">
    
    <div class="capy-container" onclick="alert('pls donate bro')">
        <img src="https://media1.tenor.com/m/JbTTyqYpHRMAAAAd/cappy-capybara.gif" class="capy-img clickable" alt="Cappy">
        <div class="capy-text">pls donate bro</div>
    </div>

    <img src="https://i.pinimg.com/originals/b2/f7/01/b2f701c9e0a489e196e84a750553316f.gif" class="bottom-gif clickable" alt="Dance" onclick="alert('Dzięki za kliknięcie!')">
    <img src="https://www.instalki.pl/wp-content/uploads/program/icons/eYgA2pao_400x400.png" class="support-img clickable" alt="Support" onclick="alert('Only you can support me!')">

    <div class="hub-card">
        <h2 class="title">Nixware for month ❤️</h2>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <a href="https://buymeacoffee.com/bilykovsasb" target="_blank" class="bmc-button">Buy me a coffee</a>
    </div>

</body>
</html>
