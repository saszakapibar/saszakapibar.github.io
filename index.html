<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Card & Progress</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .fixed-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 75px;
            height: auto;
            z-index: 1000;
            transition: transform 0.3s ease;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .fixed-logo:hover {
            transform: scale(1.15);
        }

        .hub-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
        }

        .goal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f0f6fc;
        }

        .progress-container {
            background-color: #21262d;
            border-radius: 10px;
            height: 22px;
            width: 100%;
            margin-bottom: 35px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .progress-bar {
            height: 100%;
            width: 45%; 
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(79, 172, 254, 0.7);
            position: relative;
            display: flex;
            align-items: center;
        }

        .progress-text {
            position: absolute;
            left: 15px;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 1;
        }

        /* Chomik zakodowany w Base64 - nie potrzebuje połączenia z serwerem zdjęć */
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -15px;
            top: -18px;
            width: 32px;
            height: 32px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23f39c12"/><circle cx="35" cy="40" r="5" fill="%23000"/><circle cx="65" cy="40" r="5" fill="%23000"/><path d="M40 60 q10 10 20 0" stroke="%23000" stroke-width="5" fill="none"/></svg>'); 
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.8);
            z-index: 2;
        }

        .progress-bar::before {
            content: 'pls';
            position: absolute;
            right: -13px;
            top: -36px;
            font-size: 11px;
            font-weight: bold;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.8);
            z-index: 3;
        }

        .bmc-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            background-color: #FFDD00;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 10px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255, 221, 0, 0.2);
        }

        .bmc-button:hover {
            background-color: #ffea00;
            transform: translateY(-1px);
        }

        .bmc-button:active {
            transform: translateY(1px);
        }

        .bmc-button svg {
            margin-right: 8px;
            height: 18px;
            width: auto;
        }

        @media (max-width: 480px) {
            .fixed-logo {
                top: 15px;
                left: 15px;
                width: 60px;
            }
            .hub-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo chomika w rogu ekranu z proxy -->
    <img src="https://images.weserv.nl/?url=i.imgur.com/RbksvZV.jpeg" alt="Hamster Logo" class="fixed-logo">

    <div class="hub-card">
        <h2 class="goal-title">Goal: Nixware for a month (CS2)</h2>
        
        <div class="progress-container">
            <div class="progress-bar">
                <span class="progress-text">Nixware for month</span>
            </div>
        </div>

        <a href="https://buymeacoffee.com/bilykovsasb" target="_blank" class="bmc-button">
            <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M24.7 10.3c-.6 0-1.1.2-1.6.5V7.4c0-1.9-1.5-3.4-3.4-3.4H5.3C3.4 4 1.9 5.5 1.9 7.4v12c0 3.7 2.8 6.8 6.5 7.2 1 .1 2 .1 3 0 3.1-.3 5.7-2.4 6.4-5.3h1.8c3.2 0 5.8-2.6 5.8-5.8v-2c.1-1.8-1.4-3.2-3.2-3.2zm1.3 5.2c0 2.1-1.7 3.8-3.8 3.8h-1.2v-7.1H23c2.1 0 3.8 1.7 3.8 3.8v-0.5z"/>
            </svg>
            Buy me a coffee
        </a>
    </div>

</body>
</html>
