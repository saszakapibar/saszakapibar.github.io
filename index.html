<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Card</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        /* Logo w lewym górnym rogu */
        .fixed-logo { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            width: 75px; 
            height: 75px; 
            z-index: 1000; 
            border-radius: 50%; 
            object-fit: cover; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
            border: 2px solid #30363d; 
        }

        .hub-card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            padding: 30px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-bottom: 25px; 
            color: #f0f6fc; 
        }

        .progress-container { 
            background-color: #21262d; 
            border-radius: 10px; 
            height: 22px; 
            width: 100%; 
            margin-bottom: 35px; 
            position: relative; 
        }

        .progress-bar { 
            height: 100%; 
            width: 45%; 
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); 
            border-radius: 10px; 
            position: relative; 
        }

        /* GIF chomika */
        .hamster-gif {
            position: absolute;
            right: -25px;
            top: -30px;
            width: 50px;
            height: 50px;
            z-index: 10;
        }

        .bmc-button { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 14px; 
            background-color: #FFDD00; 
            color: #000; 
            text-decoration: none; 
            font-weight: 700; 
            border-radius: 10px; 
            transition: transform 0.1s;
        }
        
        .bmc-button:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <img src="https://pbs.twimg.com/media/FGH_shaXwAQOUid.png" alt="Logo" class="fixed-logo">

    <div class="hub-card">
        <h2 class="title">Nixware for month ❤️</h2>
         
        <div class="progress-container">
            <div class="progress-bar">
                <img src="https://media.tenor.com/bw2H0PEvq7EAAAAi/chomik-chomikuj.gif" alt="Chomik" class="hamster-gif">
            </div>
        </div>

        <a href="https://buymeacoffee.com/bilykovsasb" target="_blank" class="bmc-button">
            Buy me a coffee
        </a>
    </div>

</body>
</html>
