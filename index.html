<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Card</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            overflow: hidden; 
        }

        /* Animacja pływania */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .floating { animation: float 4s ease-in-out infinite; }
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 1s; }
        .delay-4 { animation-delay: 1.5s; }

        .fixed-logo { position: fixed; top: 20px; left: 20px; width: 75px; height: 75px; z-index: 1000; border-radius: 50%; border: 2px solid #30363d; object-fit: cover; }

        .capy-container { position: fixed; top: 20px; right: 20px; z-index: 1000; text-align: center; }
        .right-top-gif { width: 100px; cursor: pointer; }

        .bottom-gif { position: fixed; bottom: 20px; left: 20px; width: 120px; z-index: 1000; }
        
        .right-bottom-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; text-align: center; }
        .right-bottom-img { width: 80px; cursor: pointer; border-radius: 50%; }

        .hover-text {
            visibility: hidden;
            background-color: #30363d;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            position: absolute;
            bottom: 100%;
            right: 0;
            width: 200px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .capy-container:hover .hover-text, 
        .right-bottom-container:hover .hover-text { visibility: visible; }

        .hub-card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 16px; 
            padding: 30px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; color: #f0f6fc; }
        .progress-container { background-color: #21262d; border-radius: 10px; height: 22px; width: 100%; margin-bottom: 35px; position: relative; }
        .progress-bar { height: 100%; width: 45%; background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); border-radius: 10px; position: relative; }
        .hamster-gif { position: absolute; right: -25px; top: -30px; width: 50px; height: 50px; z-index: 10; }

        .bmc-button { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 14px; background-color: #FFDD00; color: #000; text-decoration: none; font-weight: 700; border-radius: 10px; transition: transform 0.1s; }
        .bmc-button:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <img src="https://pbs.twimg.com/media/FGH_shaXwAQOUid.png" alt="Logo" class="fixed-logo floating delay-1">
    
    <div class="capy-container">
        <img src="https://media1.tenor.com/m/JbTTyqYpHRMAAAAd/cappy-capybara.gif" alt="Cappy" class="right-top-gif floating delay-2">
        <div class="hover-text">pls donate bro</div>
    </div>

    <img src="https://i.pinimg.com/originals/b2/f7/01/b2f701c9e0a489e196e84a750553316f.gif" alt="Dance" class="bottom-gif floating delay-3">

    <div class="right-bottom-container">
        <img src="https://www.instalki.pl/wp-content/uploads/program/icons/eYgA2pao_400x400.png" alt="Support" class="right-bottom-img floating delay-4">
        <div class="hover-text">Only you can support me financially; the amount doesn't matter.</div>
    </div>

    <div class="hub-card">
        <h2 class="title">Nixware for month ❤️</h2>
         
        <div class="progress-container">
            <div class="progress-bar">
                <img src="https://media.tenor.com/bw2H0PEvq7EAAAAi/chomik-chomikuj.gif" alt="Chomik" class="hamster-gif">
            </div>
        </div>

        <a href="https://buymeacoffee.com/bilykovsasb" target="_blank" class="bmc-button">
            Buy me a coffee
        </a>
    </div>

</body>
</html>
